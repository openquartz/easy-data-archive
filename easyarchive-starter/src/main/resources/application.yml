server:
  port: 8789
  servlet:
    context-path: /

spring:
  application:
    name: easy-archive-platform

  datasource:
    driver-class-name: com.mysql.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:openquartz}?useUnicode=true&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=${MYSQL_TIMEZONE:Asia/Shanghai}
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      pool-name: EasyArchiveHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1

  security:
    filter:
      order: -100

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.openquartz.easyarchive.core.common,com.openquartz.easyarchive.core.rule.entity,com.openquartz.easyarchive.core.connection.entity

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env
  endpoint:
    health:
      show-details: when_authorized

archive:
  task:
    thread-pool:
      core-pool-size: 10
      max-pool-size: 50
      queue-capacity: 100
      thread-name-prefix: archive-task-
  datasource:
    test-query: SELECT 1
  rule:
    default-batch-size: 1000
    default-pause-ms: 100

logging:
  level:
    com.openquartz.easyarchive: DEBUG
    org.springframework.security: INFO
    org.mybatis: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/easy-archive-platform.log

sync:
  connection:
    config: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:openquartz}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=${MYSQL_TIMEZONE:Asia/Shanghai}
    config-username: ${MYSQL_USER:root}
    config-password: ${MYSQL_PASSWORD:123456}

  config:
    connection: ${sync.connection.config}
    table: archive_config

  reader:
    load:
      max:
        rows: 5000
      unit-time:
        max:
          try:
            frequency: 10000
  archive:
    step:
      interval:
        time: 50
  log:
    enabled: true
    retention-days: 30
